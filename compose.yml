services:
  # Main app service for running tests and Go commands
  # Override command via: docker compose run --rm app <command>
  app:
    image: golang:1.26.4-trixie
    volumes:
      - "./:/app"
    networks:
      - idx-network
    working_dir: "/app"
    command: sh -c "rm -f go.work go.work.sum && go work init . ./integration-tests && go test -v ./..."
    stop_signal: SIGINT

  # Test service: runs all tests (unit + integration) with databases
  # Used by: make test-docker (docker compose up --abort-on-container-exit)
  test:
    image: golang:1.26.4-trixie
    volumes:
      - "./:/app"
    networks:
      - idx-network
    working_dir: "/app"
    depends_on:
      postgres:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command:
      - "sh"
      - "-c"
      - "rm -f go.work go.work.sum && go work init . ./integration-tests && go mod download && go test -v -race ./... && cd integration-tests && go test -v -race ./..."
    stop_signal: SIGINT

  # Database services with health checks
  postgres:
    image: postgres:18.4-alpine3.24
    restart: always
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - idx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:12.3.2-ubi10
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: password
    networks:
      - idx-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8.3.4-noble
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - idx-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")' -u root -p password --authenticationDatabase admin"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  idx-network:
    driver: bridge
