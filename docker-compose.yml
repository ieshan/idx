services:
  # Main app service for running tests and Go commands
  app:
    image: golang:1.26.2-trixie
    volumes:
      - "./:/app"
    networks:
      - idx-network
    working_dir: "/app"
    # Default: run unit tests. Override via `docker compose run --rm app <command>`
    command: go test -v
  # Database services with health checks
  postgres:
    image: postgres:18.3-alpine3.23
    restart: always
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - idx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:12.2.2-ubi10
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: password
    networks:
      - idx-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8.2.7-noble
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - idx-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")' -u root -p password --authenticationDatabase admin"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  idx-network:
    driver: bridge
